<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco AR Treasure</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        /* Camera Background */
        #v { position: absolute; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        /* The Permission Gate */
        #gate { position: fixed; inset: 0; background: #0a0a0c; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .btn { width: 80%; padding: 20px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn:disabled { background: #333; color: #777; }

        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: rgba(0,0,0,0.6); border-bottom: 2px solid var(--gold); z-index: 10; display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; }
        #hud span { color: var(--cyan); }

        /* AR World */
        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 80px; height: 80px; background: linear-gradient(45deg, #ffd700, #ff8c00); border: 4px solid #fff; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 25px gold; cursor: pointer; }
        .box::after { content: '🎁'; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; z-index: 2; }
        #debug { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.5); z-index: 20; }
    </style>
</head>
<body>

<video id="v" autoplay playsinline></video>

<div id="gate">
    <h2 style="color:var(--gold)">AR SCANNER</h2>
    <p>Step 1 & 2 must be GREEN to start.</p>
    <button id="b1" class="btn">1. ACCESS CAMERA</button>
    <button id="b2" class="btn">2. ACCESS SENSORS</button>
    <button id="bStart" class="btn" style="background:#2ecc71; display:none;">START SCANNING</button>
</div>

<div id="hud">
    <div>FOUND: <span id="s">0</span></div>
</div>

<div id="crosshair"></div>
<div id="world"></div>
<div id="debug">Sensors: Waiting...</div>

<script>
    let score = 0;
    let treasures = [];
    let curA = 0, curB = 0; // Alpha (Compass), Beta (Tilt)
    let active = false;

    // --- PERMISSION LOGIC (The stuff that worked!) ---
    const b1 = document.getElementById('b1');
    const b2 = document.getElementById('b2');
    const bStart = document.getElementById('bStart');

    b1.onclick = async () => {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('v').srcObject = s;
            b1.style.background = "#1a1a1a";
            b1.style.color = "#0f0";
            b1.innerText = "CAMERA: ONLINE";
            b1.disabled = true;
            checkReady();
        } catch (e) { alert("Cam Error: " + e); }
    };

    b2.onclick = async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const p = await DeviceOrientationEvent.requestPermission();
                if (p === 'granted') { setupSensors(); }
            } catch (e) { alert("Sensor Error: " + e); }
        } else { setupSensors(); }
    };

    function setupSensors() {
        window.addEventListener('deviceorientation', (e) => {
            curA = e.webkitCompassHeading || (360 - e.alpha) || 0;
            curB = e.beta || 0;
            document.getElementById('debug').innerText = `A: ${Math.floor(curA)} | B: ${Math.floor(curB)}`;
        }, true);
        b2.style.background = "#1a1a1a";
        b2.style.color = "#0f0";
        b2.innerText = "SENSORS: ONLINE";
        b2.disabled = true;
        checkReady();
    }

    function checkReady() {
        if (b1.disabled && b2.disabled) bStart.style.display = "block";
    }

    // --- GAME LOGIC ---
    bStart.onclick = () => {
        document.getElementById('gate').style.display = "none";
        active = true;
        // Spawn first box right in front to calibrate
        spawn(true);
        // Spawn 4 random ones
        for(let i=0; i<4; i++) spawn(false);
        requestAnimationFrame(loop);
    };

    function spawn(center) {
        let tA = center ? curA : Math.random() * 360;
        let tB = center ? curB : (Math.random() * 60) + 40; // Near eye level

        const el = document.createElement('div');
        el.className = 'box';
        el.dataset.a = tA;
        el.dataset.b = tB;

        el.onclick = function() {
            score++;
            document.getElementById('s').innerText = score;
            if (navigator.vibrate) navigator.vibrate(100);
            this.remove();
            treasures = treasures.filter(t => t !== el);
            setTimeout(() => spawn(false), 2000); // Respawn new one
        };

        document.getElementById('world').appendChild(el);
        treasures.push(el);
    }

    function loop() {
        if (!active) return;

        const ww = window.innerWidth;
        const wh = window.innerHeight;
        const fov = ww / 60; // Field of View (pixels per degree)

        treasures.forEach(t => {
            const tA = parseFloat(t.dataset.a);
            const tB = parseFloat(t.dataset.b);

            // Calculate distance around the circle (handling 359 to 0 degree jump)
            let da = tA - curA;
            if (da < -180) da += 360;
            if (da > 180) da -= 360;

            let db = tB - curB;

            // Project onto screen
            const x = (ww / 2) + (da * fov);
            const y = (wh / 2) - (db * fov);

            t.style.left = x + "px";
            t.style.top = y + "px";

            // Hide boxes if they are too far behind the player
            t.style.display = (Math.abs(da) > 45) ? 'none' : 'flex';
        });

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
