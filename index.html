<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Treasure Hunter - FIXED</title>
    <style>
        :root { --accent: #d4af37; --bg: #000; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; text-align: center; }
        
        #camera-feed { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        header { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 0; background: rgba(0, 0, 0, 0.7); border-bottom: 2px solid var(--accent); z-index: 10; }
        .stats { font-weight: bold; font-size: 18px; margin-top: 5px; color: #00ffff; }

        #overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 12, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; padding: 20px; box-sizing: border-box; }
        
        .btn { padding: 20px 40px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; font-family: 'Courier New'; font-size: 20px; cursor: pointer; margin: 10px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        #ar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        .treasure { position: absolute; width: 70px; height: 70px; background: gold; border: 4px solid #fff; border-radius: 12px; box-shadow: 0 0 30px gold; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 30px; pointer-events: auto; transform: translate(-50%, -50%); transition: transform 0.05s linear; }
        .treasure::after { content: '💰'; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 2px solid white; border-radius: 50%; z-index: 5; opacity: 0.5; pointer-events: none; }

        /* Test Button - visible during gameplay */
        #test-spawn { position: absolute; bottom: 30px; right: 20px; padding: 10px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 5px; z-index: 15; font-size: 12px; }
        #debug { position: absolute; bottom: 30px; left: 20px; color: #0f0; font-size: 12px; z-index: 15; text-align: left; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline></video>

<div id="overlay">
    <h1 style="color:var(--accent)">SENSORS REQUIRED</h1>
    <p style="color:#ccc; font-size: 14px;">This game uses your phone's gyroscope to place treasure in the room.</p>
    <button class="btn" id="start-btn">UNLOCK SENSORS & CAMERA</button>
</div>

<header>
    <div>TREASURE HUNTER</div>
    <div class="stats">FOUND: <span id="score-display">0</span></div>
</header>

<div id="crosshair"></div>
<div id="ar-container"></div>
<button id="test-spawn" onclick="spawnTreasure(true)">SPAWN BOX AT CROSSHAIR</button>
<div id="debug">Sensors: OFF</div>

<script>
    let score = 0;
    let treasures = [];
    let currentAlpha = 0; // Compass
    let currentBeta = 0;  // Tilt
    let isRunning = false;

    const startBtn = document.getElementById('start-btn');

    startBtn.addEventListener('click', async () => {
        // Step 1: Request Camera
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-feed').srcObject = stream;
        } catch (err) {
            alert("Camera denied. AR will not work.");
        }

        // Step 2: Request Motion (iOS specific)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    initGame();
                } else {
                    alert("Motion permission denied.");
                }
            } catch (err) {
                alert("Motion error: " + err);
            }
        } else {
            // Android or Desktop
            initGame();
        }
    });

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        window.addEventListener('deviceorientation', (e) => {
            // Normalize compass heading
            currentAlpha = e.webkitCompassHeading || (360 - e.alpha) || 0;
            currentBeta = e.beta || 0;
            document.getElementById('debug').innerHTML = `ALPHA: ${Math.floor(currentAlpha)}<br>BETA: ${Math.floor(currentBeta)}`;
        });
        
        isRunning = true;
        // Spawn 3 random ones and 1 right in front
        spawnTreasure(true); 
        for(let i=0; i<3; i++) spawnTreasure(false);
        
        requestAnimationFrame(updateLoop);
    }

    function spawnTreasure(rightInFront = false) {
        let tAlpha, tBeta;

        if (rightInFront) {
            // Place it exactly where the phone is currently pointing
            tAlpha = currentAlpha;
            tBeta = currentBeta;
        } else {
            tAlpha = Math.floor(Math.random() * 360);
            tBeta = Math.floor(Math.random() * 40) + 60; // Keep it near eye-level
        }

        const box = document.createElement('div');
        box.className = 'treasure';
        box.dataset.alpha = tAlpha;
        box.dataset.beta = tBeta;

        box.onclick = function() {
            score++;
            document.getElementById('score-display').innerText = score;
            this.remove();
            treasures = treasures.filter(t => t !== box);
            setTimeout(() => spawnTreasure(false), 1000); // Replacement
        };

        document.getElementById('ar-container').appendChild(box);
        treasures.push(box);
    }

    function getAngleDiff(target, current) {
        let diff = target - current;
        while (diff < -180) diff += 360;
        while (diff > 180) diff -= 360;
        return diff;
    }

    function updateLoop() {
        if (!isRunning) return;

        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const fov = sw / 60; // Field of View scaling

        treasures.forEach(box => {
            const tA = parseFloat(box.dataset.alpha);
            const tB = parseFloat(box.dataset.beta);

            const dx = getAngleDiff(tA, currentAlpha);
            const dy = tB - currentBeta;

            const x = (sw / 2) + (dx * fov);
            const y = (sh / 2) - (dy * fov);

            box.style.left = `${x}px`;
            box.style.top = `${y}px`;

            // If it's behind the player, hide it
            if (Math.abs(dx) > 60) {
                box.style.display = 'none';
            } else {
                box.style.display = 'flex';
            }
        });

        requestAnimationFrame(updateLoop);
    }
</script>
</body>
</html>
