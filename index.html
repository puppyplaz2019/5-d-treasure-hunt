<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco AR - 5D Treasure Hunt</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; user-select: none; }
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; background: #1a1a1a; }
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .btn { width: 260px; padding: 20px; margin: 10px; border: 2px solid var(--gold); background: #111; color: var(--gold); font-weight: bold; border-radius: 12px; -webkit-appearance: none; font-size: 16px; }
        .btn:disabled { border-color: #333; color: #444; }
        #hud { position: absolute; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); z-index: 10; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 90px; height: 90px; background: gold; border: 3px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 45px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 20px gold; border-radius: 10px; }
        .box::after { content: '🎁'; }
        #debug { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 11px; color: #0f0; background: rgba(0,0,0,0.6); pointer-events: none; }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline muted></video>

<div id="setup">
    <h2 id="setup-title" style="color:var(--gold)">INITIALIZING...</h2>
    <p id="setup-msg" style="color:#666;">Waiting for System Brain...</p>
    <button id="b1" class="btn" disabled>1. ENABLE CAMERA</button>
    <button id="b2" class="btn" disabled>2. ENABLE SENSORS</button>
    <button id="bStart" class="btn" style="border-color:#2ecc71; color:#2ecc71; display:none;">START TREASURE HUNT</button>
</div>

<div id="hud">
    <div>UNFOUND: <span id="count" style="color:var(--cyan)">0</span></div>
    <div style="font-size:10px; opacity:0.6;">TYX-SYNC</div>
</div>

<div id="world"></div>
<div id="debug">System Offline</div>

<script>
    // --- IPAD SURVIVAL SCRIPT ---
    const URL = 'https://tyxezjyjwghgajsilsbg.supabase.co';
    const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eGV6anlqd2doZ2Fqc2lsc2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNjczODksImV4cCI6MjA4NDg0MzM4OX0.K1elrtEtbsQPTEQNfweLkh7FXq-Er38Oa5aYtqqV65Q';
    
    let _sb, myLat = 31.8976, myLon = -100.4819, myHdg = 0, treasures = [], active = false;

    // Force unlock buttons if library takes too long
    function checkLib() {
        if (typeof supabase !== 'undefined') {
            _sb = supabase.createClient(URL, KEY);
            document.getElementById('setup-title').innerText = "SYSTEM READY";
            document.getElementById('setup-msg').innerText = "Tap in sequence:";
        } else {
            document.getElementById('setup-title').innerText = "LIMITED MODE";
            document.getElementById('setup-msg').innerText = "Database offline. Try anyway?";
        }
        document.getElementById('b1').disabled = false;
        document.getElementById('b2').disabled = false;
    }
    window.onload = () => setTimeout(checkLib, 1000);

    // Camera Access
    document.getElementById('b1').onclick = async function() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-bg').srcObject = s;
            this.innerText = "CAMERA ACTIVE";
            this.disabled = true;
            this.style.background = "#050";
            readyCheck();
        } catch(e) { alert("Camera blocked! Check Safari settings."); }
    };

    // Sensors (iPad Compass/GPS)
    document.getElementById('b2').onclick = async function() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const p = await DeviceOrientationEvent.requestPermission();
            if (p === 'granted') {
                window.addEventListener('deviceorientation', e => { myHdg = e.webkitCompassHeading || (360 - e.alpha) || 0; }, true);
            }
        }
        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude;
            myLon = p.coords.longitude;
        }, null, { enableHighAccuracy: true });

        this.innerText = "SENSORS ACTIVE";
        this.disabled = true;
        this.style.background = "#050";
        readyCheck();
    };

    function readyCheck() {
        if(document.getElementById('b1').disabled && document.getElementById('b2').disabled) {
            document.getElementById('bStart').style.display = "block";
        }
    }

    // Database Pull
    async function sync() {
        if(!_sb) return;
        const { data, error } = await _sb.from('treasures').select('*').eq('collected', false);
        if (error) return;
        
        const world = document.getElementById('world');
        world.innerHTML = '';
        treasures = data.map(item => {
            const el = document.createElement('div');
            el.className = 'box';
            el.dataset.lat = item.lat;
            el.dataset.lon = item.lon;
            el.ontouchend = async (e) => {
                e.preventDefault();
                await _sb.from('treasures').update({ collected: true }).eq('id', item.id);
                sync();
            };
            world.appendChild(el);
            return el;
        });
        document.getElementById('count').innerText = treasures.length;
    }

    document.getElementById('bStart').onclick = () => {
        document.getElementById('setup').style.display = 'none';
        active = true;
        sync();
        setInterval(sync, 5000);
        loop();
    };

    function loop() {
        if (!active) return;
        const ww = window.innerWidth, wh = window.innerHeight, fov = ww / 60;
        document.getElementById('debug').innerText = `LAT: ${myLat.toFixed(4)} LON: ${myLon.toFixed(4)} | ${Math.floor(myHdg)}°`;

        treasures.forEach(t => {
            const tLat = parseFloat(t.dataset.lat), tLon = parseFloat(t.dataset.lon);
            const dy = Math.sin((tLon-myLon)*Math.PI/180) * Math.cos(tLat*Math.PI/180);
            const dx = Math.cos(myLat*Math.PI/180)*Math.sin(tLat*Math.PI/180) - Math.sin(myLat*Math.PI/180)*Math.cos(tLat*Math.PI/180)*Math.cos((tLon-myLon)*Math.PI/180);
            const bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;

            let diff = bearing - myHdg;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";
            t.style.display = Math.abs(diff) > 40 ? 'none' : 'flex';
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
