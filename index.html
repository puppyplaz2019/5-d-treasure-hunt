<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco Hybrid AR</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; background: #222; }
        
        #setup { position: fixed; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .btn { width: 90%; max-width: 300px; padding: 15px; margin: 10px; border: none; border-radius: 8px; font-weight: bold; background: var(--gold); cursor: pointer; }
        
        #hud { position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.8); z-index: 10; display: flex; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        
        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 80px; height: 80px; background: gold; border: 3px solid #fff; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 20px gold; }
        .box::after { content: '🎁'; }

        #debug { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.6); padding: 5px; z-index: 20; text-align: left; }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline></video>

<div id="setup">
    <h2 style="color:var(--gold)">HYBRID AR START</h2>
    <button id="b1" class="btn">1. ACCESS CAMERA</button>
    <button id="b2" class="btn">2. ACCESS SENSORS</button>
    <button id="bStart" class="btn" style="background:#2ecc71; display:none;">START HUNT</button>
    <p id="setup-msg" style="font-size:12px; color:#666;">Waiting for hardware...</p>
</div>

<div id="hud">
    <div>SCORE: <span id="score-val">0</span></div>
    <div id="mode-msg">MODE: MOBILE</div>
</div>

<div id="world"></div>
<div id="debug">System Initializing...</div>

<script>
    let score = 0;
    let treasures = [];
    let myLat = 0, myLon = 0, myHeading = 0;
    let isMobile = false;
    let active = false;

    // --- SETUP CONTROLS ---
    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2'), bStart = document.getElementById('bStart');

    b1.onclick = async () => {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-bg').srcObject = s;
            b1.disabled = true; b1.style.opacity = 0.5;
            checkReady();
        } catch(e) { console.log("Cam bypass"); b1.disabled = true; }
    };

    b2.onclick = async () => {
        // Try Compass
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const p = await DeviceOrientationEvent.requestPermission();
            if (p === 'granted') {
                window.addEventListener('deviceorientation', e => { 
                    myHeading = e.webkitCompassHeading || (360 - e.alpha) || 0;
                    isMobile = true;
                }, true);
            }
        } else {
            window.addEventListener('deviceorientation', e => { 
                if(e.alpha !== null) { myHeading = (360 - e.alpha); isMobile = true; }
            });
        }

        // Try GPS
        navigator.geolocation.getCurrentPosition(p => {
            myLat = p.coords.latitude;
            myLon = p.coords.longitude;
            document.getElementById('setup-msg').innerText = "GPS Fixed!";
        }, err => {
            document.getElementById('setup-msg').innerText = "GPS Failed - Using Mock Location";
            myLat = 40.7128; myLon = -74.0060; // Fake NYC coordinates
        });

        b2.disabled = true; b2.style.opacity = 0.5;
        checkReady();
    };

    function checkReady() { if(b1.disabled && b2.disabled) bStart.style.display = "block"; }

    // --- PC MOUSE CONTROL FALLBACK ---
    let isDragging = false;
    window.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        if (!isMobile && isDragging) {
            myHeading += e.movementX * 0.5; // Drag to rotate
            document.getElementById('mode-msg').innerText = "MODE: PC (DRAG MOUSE)";
        }
    });

    // --- GAME START ---
    bStart.onclick = () => {
        document.getElementById('setup').style.display = 'none';
        active = true;
        
        // Spawn 10 boxes in a row
        for(let i=1; i<=10; i++) {
            let dist = i * 3; // Spaced 3 meters apart
            let pos = getPointAhead(myLat, myLon, myHeading, dist);
            spawn(pos.lat, pos.lon);
        }
        requestAnimationFrame(loop);
    };

    function spawn(lat, lon) {
        const el = document.createElement('div');
        el.className = 'box';
        el.dataset.lat = lat;
        el.dataset.lon = lon;
        el.onclick = function() {
            score++;
            document.getElementById('score-val').innerText = score;
            this.remove();
            treasures = treasures.filter(t => t !== el);
        };
        document.getElementById('world').appendChild(el);
        treasures.push(el);
    }

    function getPointAhead(lat, lon, heading, distance) {
        const R = 6371e3;
        const brng = heading * Math.PI / 180;
        const lat1 = lat * Math.PI / 180;
        const lon1 = lon * Math.PI / 180;
        const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distance/R) + Math.cos(lat1) * Math.sin(distance/R) * Math.cos(brng));
        const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distance/R) * Math.cos(lat1), Math.cos(distance/R) - Math.sin(lat1) * Math.sin(lat2));
        return { lat: lat2 * 180 / Math.PI, lon: lon2 * 180 / Math.PI };
    }

    function loop() {
        if (!active) return;
        const ww = window.innerWidth, wh = window.innerHeight;
        const fov = ww / 60;

        document.getElementById('debug').innerText = `LAT: ${myLat.toFixed(4)} | LON: ${myLon.toFixed(4)} | HDG: ${Math.floor(myHeading)}°`;

        treasures.forEach(t => {
            const tLat = parseFloat(t.dataset.lat);
            const tLon = parseFloat(t.dataset.lon);
            
            // Bearing calculation
            const dy = Math.sin((tLon-myLon)*Math.PI/180) * Math.cos(tLat*Math.PI/180);
            const dx = Math.cos(myLat*Math.PI/180)*Math.sin(tLat*Math.PI/180) - Math.sin(myLat*Math.PI/180)*Math.cos(tLat*Math.PI/180)*Math.cos((tLon-myLon)*Math.PI/180);
            const bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;

            let diff = bearing - myHeading;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";
            t.style.display = Math.abs(diff) > 60 ? 'none' : 'flex';
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
