<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco AR - New Project Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; touch-action: none; user-select: none; }
        #camera-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; background: #1a1a1a; }
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { width: 250px; padding: 20px; margin: 10px; border: none; background: var(--gold); font-weight: bold; cursor: pointer; border-radius: 5px; }
        #hud { position: absolute; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); z-index: 10; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid var(--gold); }
        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 80px; height: 80px; background: gold; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 15px gold; cursor: pointer; }
        .box::after { content: '🎁'; }
        #debug { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 11px; color: #0f0; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<video id="camera-bg" autoplay playsinline></video>

<div id="setup">
    <h2 style="color:var(--gold)">NEW PROJECT SYNC</h2>
    <button id="b1" class="btn">1. START CAMERA</button>
    <button id="b2" class="btn">2. START SENSORS</button>
    <button id="bStart" class="btn" style="background:#2ecc71; display:none;">INITIALIZE HUNT</button>
</div>

<div id="hud">
    <div>UNFOUND: <span id="count" style="color:var(--cyan)">0</span></div>
    <div id="status-msg">PROJECT: TYX...</div>
</div>

<div id="world"></div>
<div id="debug">Ready...</div>

<script>
    const SUPABASE_URL = 'https://tyxezjyjwghgajsilsbg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eGV6anlqd2doZ2Fqc2lsc2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNjczODksImV4cCI6MjA4NDg0MzM4OX0.K1elrtEtbsQPTEQNfweLkh7FXq-Er38Oa5aYtqqV65Q';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let myLat = 31.8976, myLon = -100.4819, myHeading = 0, treasures = [], active = false;

    // Buttons
    document.getElementById('b1').onclick = async () => {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).catch(() => null);
        if(s) document.getElementById('camera-bg').srcObject = s;
        document.getElementById('b1').disabled = true;
        checkReady();
    };

    document.getElementById('b2').onclick = async () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            await DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', e => { 
            myHeading = e.webkitCompassHeading || (360 - e.alpha) || 0;
        }, true);
        
        navigator.geolocation.watchPosition(p => {
            myLat = p.coords.latitude;
            myLon = p.coords.longitude;
        }, null, {enableHighAccuracy: true});

        document.getElementById('b2').disabled = true;
        checkReady();
    };

    function checkReady() { if(document.getElementById('b1').disabled && document.getElementById('b2').disabled) document.getElementById('bStart').style.display = "block"; }

    async function refreshTreasures() {
        const { data, error } = await _supabase.from('treasures').select('*').eq('collected', false);
        if (error) { document.getElementById('debug').innerText = "DB ERROR: " + error.message; return; }
        
        const world = document.getElementById('world');
        world.innerHTML = '';
        treasures = data.map(item => {
            const el = document.createElement('div');
            el.className = 'box';
            el.dataset.lat = item.lat;
            el.dataset.lon = item.lon;
            el.onclick = async () => {
                await _supabase.from('treasures').update({ collected: true }).eq('id', item.id);
                refreshTreasures();
            };
            world.appendChild(el);
            return el;
        });
        document.getElementById('count').innerText = data.length;
    }

    document.getElementById('bStart').onclick = () => {
        document.getElementById('setup').style.display = 'none';
        active = true;
        refreshTreasures();
        setInterval(refreshTreasures, 4000);
        requestAnimationFrame(loop);
    };

    function loop() {
        if (!active) return;
        const ww = window.innerWidth, wh = window.innerHeight, fov = ww / 60;
        document.getElementById('debug').innerText = `GPS: ${myLat.toFixed(4)}, ${myLon.toFixed(4)} | HDG: ${Math.floor(myHeading)}°`;

        treasures.forEach(t => {
            const tLat = parseFloat(t.dataset.lat), tLon = parseFloat(t.dataset.lon);
            const dy = Math.sin((tLon-myLon)*Math.PI/180) * Math.cos(tLat*Math.PI/180);
            const dx = Math.cos(myLat*Math.PI/180)*Math.sin(tLat*Math.PI/180) - Math.sin(myLat*Math.PI/180)*Math.cos(tLat*Math.PI/180)*Math.cos((tLon-myLon)*Math.PI/180);
            const bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;

            let diff = bearing - myHeading;
            while (diff < -180) diff += 360;
            while (diff > 180) diff -= 360;

            t.style.left = (ww/2) + (diff * fov) + "px";
            t.style.top = (wh/2) + "px";
            t.style.display = Math.abs(diff) > 45 ? 'none' : 'flex';
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
