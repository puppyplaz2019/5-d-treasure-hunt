<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>5-D FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.1.0/dist/umd/supabase.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #cam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #ui { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid gold; }
        #setup-screen { position: fixed; inset: 0; background: #000; z-index: 200; text-align: center; padding-top: 100px; }
        .box { position: absolute; width: 80px; height: 80px; background: gold; color: #000; font-size: 40px; display: flex; justify-content: center; align-items: center; border-radius: 10px; transform: translate(-50%, -50%); z-index: 50; }
        .btn { padding: 20px; background: gold; color: #000; font-weight: bold; border: none; border-radius: 10px; margin: 10px; font-size: 16px; -webkit-appearance: none; }
        #log { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); font-size: 10px; color: #0f0; padding: 5px; z-index: 300; }
    </style>
</head>
<body>

    <video id="cam" autoplay playsinline muted></video>

    <div id="setup-screen">
        <button class="btn" onclick="initCam()">ACTIVATE CAMERA</button>
        <button class="btn" onclick="initSensors()">ACTIVATE SENSORS</button>
        <button id="go" class="btn" style="display:none; background:#0f0;" onclick="startGame()">START MISSION</button>
    </div>

    <div id="ui" style="display:none;">
        <div>ITEMS: <span id="count">0</span></div>
        <button class="btn" style="padding:10px; margin:0;" onclick="spawn()">+ DROP BOX</button>
    </div>

    <div id="world"></div>
    <div id="log">SYSTEM READY...</div>

<script>
    var URL = 'https://tyxezjyjwghgajsilsbg.supabase.co';
    var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5eGV6anlqd2doZ2Fqc2lsc2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNjczODksImV4cCI6MjA4NDg0MzM4OX0.K1elrtEtbsQPTEQNfweLkh7FXq-Er38Oa5aYtqqV65Q';
    var _db, lat = 0, lon = 0, hdg = 0, data = [], active = false;

    function msg(t) { document.getElementById('log').innerText = t; }

    function initCam() {
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
        .then(function(s){ document.getElementById('cam').srcObject = s; msg("CAMERA OK"); check(); })
        .catch(function(e){ alert("Camera Error. Check Settings."); });
    }

    function initSensors() {
        if(window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) DeviceOrientationEvent.requestPermission();
        window.addEventListener('deviceorientation', function(e){ hdg = e.webkitCompassHeading || (360-e.alpha) || 0; }, true);
        navigator.geolocation.watchPosition(function(p){ lat = p.coords.latitude; lon = p.coords.longitude; msg("GPS READY"); check(); }, null, {enableHighAccuracy:true});
    }

    function check() { document.getElementById('go').style.display = "inline-block"; }

    function sync() {
        if(!_db) _db = supabase.createClient(URL, KEY);
        _db.from('treasures').select('*').eq('collected', false).then(function(res){
            if(res.error) { msg("SYNC ERROR"); return; }
            data = res.data || [];
            document.getElementById('count').innerText = data.length;
            var w = document.getElementById('world');
            w.innerHTML = '';
            data.forEach(function(item, i){
                var el = document.createElement('div');
                el.className = 'box';
                el.innerHTML = '🎁';
                el.setAttribute('data-lat', item.lat);
                el.setAttribute('data-lon', item.lon);
                el.onclick = function(){ _db.from('treasures').update({collected:true}).eq('id', item.id).then(sync); };
                w.appendChild(el);
            });
            msg("FOUND " + data.length + " ITEMS");
        });
    }

    function spawn() {
        if(lat === 0) return;
        _db.from('treasures').insert([{lat:lat, lon:lon, collected:false}]).then(function(){ sync(); });
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('ui').style.display = 'flex';
        active = true;
        sync();
        setInterval(sync, 5000);
        loop();
    }

    function loop() {
        if(!active) return;
        var ww = window.innerWidth, wh = window.innerHeight, fov = ww/60;
        var boxes = document.getElementsByClassName('box');
        for(var i=0; i<boxes.length; i++) {
            var b = boxes[i];
            var bLat = parseFloat(b.getAttribute('data-lat'));
            var bLon = parseFloat(b.getAttribute('data-lon'));
            var dy = Math.sin((bLon-lon)*Math.PI/180) * Math.cos(bLat*Math.PI/180);
            var dx = Math.cos(lat*Math.PI/180)*Math.sin(bLat*Math.PI/180) - Math.sin(lat*Math.PI/180)*Math.cos(bLat*Math.PI/180)*Math.cos((bLon-lon)*Math.PI/180);
            var bearing = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
            var diff = bearing - hdg;
            while(diff < -180) diff += 360; while(diff > 180) diff -= 360;
            b.style.left = (ww/2) + (diff * fov) + "px";
            b.style.top = (wh/2) + "px";
            b.style.display = Math.abs(diff) > 40 ? 'none' : 'flex';
        }
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
