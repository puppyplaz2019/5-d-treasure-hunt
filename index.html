<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENSOR DIAGNOSTIC</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 1px solid #333; padding: 15px; margin: 10px 0; background: #000; }
        button { width: 100%; padding: 20px; background: #2ecc71; color: #000; font-weight: bold; border: none; border-radius: 10px; font-size: 18px; margin-bottom: 20px; }
        #data-log { text-align: left; font-size: 14px; color: #0f0; }
        .fail { color: #ff4444; }
    </style>
</head>
<body>

    <h2>AR SYSTEM TEST</h2>

    <div class="box" id="protocol-check">
        HTTPS Check: <span id="https-status">Checking...</span>
    </div>

    <button id="main-btn">1. CLICK TO INITIALIZE SENSORS</button>

    <div class="box">
        <strong>SENSOR READINGS:</strong>
        <div id="data-log">
            COMPASS (Alpha): <span id="val-a">0</span><br>
            TILT (Beta): <span id="val-b">0</span><br>
            SIDE (Gamma): <span id="val-g">0</span>
        </div>
    </div>

    <div id="instruction" style="font-size: 12px; color: #888;">
        If you click the button and the numbers above don't change when you move your phone, your phone is blocking the data.
    </div>

<script>
    const httpsStatus = document.getElementById('https-status');
    const valA = document.getElementById('val-a');
    const valB = document.getElementById('val-b');
    const valG = document.getElementById('val-g');

    // Check HTTPS immediately
    if (location.protocol === 'https:') {
        httpsStatus.innerText = "OK (SECURE)";
    } else {
        httpsStatus.innerText = "FAIL (NOT SECURE)";
        httpsStatus.className = "fail";
        alert("CRITICAL ERROR: You are not on a secure HTTPS connection. The sensors will NOT work.");
    }

    document.getElementById('main-btn').onclick = async () => {
        // Step 1: Request Camera (just to prove JS is working)
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
            alert("Camera Access: GRANTED");
        } catch(e) {
            alert("Camera Access: DENIED or NOT FOUND");
        }

        // Step 2: Request Sensors (The Hard Part)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // This is the path for iPhone (iOS)
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    startTracking();
                    alert("iOS Sensor Permission: GRANTED");
                } else {
                    alert("iOS Sensor Permission: DENIED. Check your Settings > Safari > Motion & Orientation.");
                }
            } catch (e) {
                alert("iOS Permission Error: " + e);
            }
        } else {
            // This is the path for Android or older phones
            alert("No permission required for this device. Starting sensors...");
            startTracking();
        }
    };

    function startTracking() {
        window.addEventListener('deviceorientation', (event) => {
            valA.innerText = Math.floor(event.alpha || 0);
            valB.innerText = Math.floor(event.beta || 0);
            valG.innerText = Math.floor(event.gamma || 0);
            
            // Visual feedback that data is flowing
            document.body.style.borderColor = (Math.floor(event.alpha) % 2 === 0) ? "#0f0" : "#000";
        }, true);
        
        document.getElementById('main-btn').innerText = "SENSORS ACTIVE - MOVE PHONE";
        document.getElementById('main-btn').style.background = "#555";
    }
</script>
</body>
</html>
