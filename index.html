<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Treasure Hunter - THE FIX</title>
    <style>
        :root { --accent: #d4af37; --bg: #000; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #camera-feed { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        /* The "Gatekeeper" UI */
        #gatekeeper { position: fixed; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .permission-btn { width: 80%; padding: 20px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #btn-cam { background: #3498db; color: white; }
        #btn-sensor { background: #e67e22; color: white; }
        #btn-start { background: #2ecc71; color: white; display: none; }
        
        .status { font-size: 12px; margin-bottom: 20px; color: #888; }
        .error-log { color: #ff4444; font-family: monospace; font-size: 10px; margin-top: 20px; }

        /* Game Elements */
        #ar-world { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .treasure { position: absolute; width: 80px; height: 80px; background: gold; border: 5px solid white; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 20px gold; }
        .treasure::after { content: '🎁'; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; }
        #stats { position: absolute; top: 20px; width: 100%; text-align: center; font-weight: bold; z-index: 20; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline></video>

<div id="gatekeeper">
    <h2>AR INITIALIZATION</h2>
    <p class="status">Browsers require manual approval for each sensor.</p>
    
    <button id="btn-cam" class="permission-btn">1. ALLOW CAMERA</button>
    <button id="btn-sensor" class="permission-btn">2. ALLOW MOTION</button>
    
    <button id="btn-start" class="permission-btn">START SCANNER</button>
    
    <div id="log" class="error-log"></div>
</div>

<div id="stats">FOUND: <span id="score">0</span></div>
<div id="crosshair"></div>
<div id="ar-world"></div>

<script>
    let score = 0;
    let treasures = [];
    let alpha = 0, beta = 0;
    let active = false;
    const log = document.getElementById('log');

    // --- STEP 1: CAMERA ---
    document.getElementById('btn-cam').onclick = async function() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-feed').srcObject = stream;
            this.style.background = "#222";
            this.innerText = "CAMERA: OK";
            this.disabled = true;
            checkReady();
        } catch (e) {
            log.innerText += "Cam Error: " + e.message + "\n";
        }
    };

    // --- STEP 2: SENSORS ---
    document.getElementById('btn-sensor').onclick = async function() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS 13+ Path
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    startSensors();
                } else {
                    log.innerText += "Sensor Permission: DENIED\n";
                }
            } catch (e) {
                log.innerText += "Sensor Error: " + e.message + "\n";
            }
        } else {
            // Android or Older iOS Path
            startSensors();
        }
    };

    function startSensors() {
        window.addEventListener('deviceorientation', (e) => {
            alpha = e.webkitCompassHeading || (360 - e.alpha) || 0;
            beta = e.beta || 0;
        }, true);
        
        const btn = document.getElementById('btn-sensor');
        btn.style.background = "#222";
        btn.innerText = "SENSORS: OK";
        btn.disabled = true;
        checkReady();
    }

    function checkReady() {
        if (document.getElementById('btn-cam').disabled && document.getElementById('btn-sensor').disabled) {
            document.getElementById('btn-start').style.display = "block";
        }
    }

    // --- STEP 3: START ---
    document.getElementById('btn-start').onclick = function() {
        document.getElementById('gatekeeper').style.display = "none";
        active = true;
        // Spawn one right in front immediately
        spawn(true);
        // Spawn more randomly
        for(let i=0; i<4; i++) spawn(false);
        requestAnimationFrame(loop);
    };

    function spawn(inFront) {
        let tA = inFront ? alpha : Math.random() * 360;
        let tB = inFront ? beta : (Math.random() * 40) + 60;

        const el = document.createElement('div');
        el.className = 'treasure';
        el.dataset.a = tA;
        el.dataset.b = tB;
        
        el.onclick = function() {
            score++;
            document.getElementById('score').innerText = score;
            this.remove();
            treasures = treasures.filter(t => t !== el);
            setTimeout(() => spawn(false), 2000);
        };

        document.getElementById('ar-world').appendChild(el);
        treasures.push(el);
    }

    function loop() {
        if (!active) return;

        const ww = window.innerWidth;
        const wh = window.innerHeight;
        const fov = ww / 60;

        treasures.forEach(t => {
            let tA = parseFloat(t.dataset.a);
            let tB = parseFloat(t.dataset.b);

            // Angle difference logic
            let da = tA - alpha;
            while (da < -180) da += 360;
            while (da > 180) da -= 360;
            
            let db = tB - beta;

            let x = (ww/2) + (da * fov);
            let y = (wh/2) - (db * fov);

            t.style.left = x + "px";
            t.style.top = y + "px";

            // Visibility culling
            t.style.display = (Math.abs(da) > 40) ? 'none' : 'flex';
        });

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
