<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanco AR - Mega Spawn</title>
    <style>
        :root { --gold: #d4af37; --cyan: #00ffff; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        
        #v { position: absolute; inset: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        #gate { position: fixed; inset: 0; background: #0a0a0c; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .btn { width: 80%; padding: 20px; margin: 10px; border: none; border-radius: 10px; font-weight: bold; background: var(--gold); cursor: pointer; }

        #hud { position: absolute; top: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.7); z-index: 10; display: flex; justify-content: space-around; font-size: 18px; border-bottom: 2px solid var(--gold); }
        #hud span { color: var(--cyan); }

        #world { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
        .box { position: absolute; width: 70px; height: 70px; background: gold; border: 3px solid #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 30px; pointer-events: auto; transform: translate(-50%, -50%); box-shadow: 0 0 20px gold; }
        .box::after { content: '💰'; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 2px solid rgba(0,255,255,0.5); border-radius: 50%; z-index: 2; }
        
        /* Navigation Helper */
        #radar-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: var(--cyan); font-size: 12px; z-index: 10; text-shadow: 1px 1px #000; }
    </style>
</head>
<body>

<video id="v" autoplay playsinline></video>

<div id="gate">
    <h2 style="color:var(--gold)">TREASURE MEGA-SPAWN</h2>
    <button id="b1" class="btn">STEP 1: CAMERA</button>
    <button id="b2" class="btn">STEP 2: SENSORS</button>
    <button id="bStart" class="btn" style="background:#2ecc71; display:none;">START HUNT</button>
</div>

<div id="hud">
    <div>TREASURE: <span id="s">0</span></div>
    <div>NEARBY: <span id="nearby">0</span></div>
</div>

<div id="crosshair"></div>
<div id="world"></div>
<div id="radar-hint">SPIN AROUND TO FIND MORE!</div>

<script>
    let score = 0;
    let treasures = [];
    let curA = 0, curB = 0; 
    let active = false;

    const b1 = document.getElementById('b1'), b2 = document.getElementById('b2'), bStart = document.getElementById('bStart');

    b1.onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('v').srcObject = stream;
        b1.disabled = true; b1.innerText = "CAM OK"; checkReady();
    };

    b2.onclick = async () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const p = await DeviceOrientationEvent.requestPermission();
            if (p === 'granted') setupSensors();
        } else { setupSensors(); }
    };

    function setupSensors() {
        window.addEventListener('deviceorientation', (e) => {
            curA = e.webkitCompassHeading || (360 - e.alpha) || 0;
            curB = e.beta || 0;
        }, true);
        b2.disabled = true; b2.innerText = "SENSORS OK"; checkReady();
    }

    function checkReady() { if (b1.disabled && b2.disabled) bStart.style.display = "block"; }

    bStart.onclick = () => {
        document.getElementById('gate').style.display = "none";
        active = true;
        
        // Spawn 20 treasures in a full circle
        for(let i=0; i<20; i++) {
            // Random horizontal angle (0-360)
            let a = Math.random() * 360; 
            // Fixed vertical height (keeping them near your eye level so they don't "sink")
            let b = 70 + (Math.random() * 40 - 20); 
            spawn(a, b);
        }
        requestAnimationFrame(loop);
    };

    function spawn(a, b) {
        const el = document.createElement('div');
        el.className = 'box';
        el.dataset.a = a;
        el.dataset.b = b;

        el.onclick = function() {
            score++;
            document.getElementById('s').innerText = score;
            this.remove();
            treasures = treasures.filter(t => t !== el);
            // Respawn somewhere else
            setTimeout(() => spawn(Math.random()*360, 70 + (Math.random()*20-10)), 2000);
        };

        document.getElementById('world').appendChild(el);
        treasures.push(el);
    }

    function loop() {
        if (!active) return;
        const ww = window.innerWidth, wh = window.innerHeight;
        const fov = ww / 70; 
        let visibleCount = 0;

        treasures.forEach(t => {
            const tA = parseFloat(t.dataset.a);
            const tB = parseFloat(t.dataset.b);

            let da = tA - curA;
            if (da < -180) da += 360;
            if (da > 180) da -= 360;

            // Beta fix: most phones held for AR are at ~70-90 degrees.
            let db = tB - curB;

            const x = (ww / 2) + (da * fov);
            const y = (wh / 2) - (db * fov);

            t.style.left = x + "px";
            t.style.top = y + "px";

            // If box is within 45 degrees of center, show it
            if (Math.abs(da) < 45) {
                t.style.display = 'flex';
                visibleCount++;
            } else {
                t.style.display = 'none';
            }
        });

        document.getElementById('nearby').innerText = visibleCount;
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
