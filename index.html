<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Treasure Hunter - Step Fix</title>
    <style>
        :root { --accent: #d4af37; --bg: #0a0a0c; --green: #2ecc71; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; text-align: center; }
        
        #camera-feed { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; }
        
        header { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 0; background: rgba(0, 0, 0, 0.8); border-bottom: 2px solid var(--accent); z-index: 10; }
        .stats { font-weight: bold; font-size: 18px; margin-top: 5px; color: #00ffff; }

        /* Setup Overlay */
        #setup-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; padding: 20px; box-sizing: border-box; }
        .step-box { width: 100%; max-width: 300px; margin: 10px 0; padding: 20px; border: 1px solid #333; border-radius: 10px; background: #111; }
        .step-box.done { border-color: var(--green); }
        .step-box.done .status-icon { color: var(--green); }
        
        .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 5px; font-weight: bold; font-family: 'Courier New'; font-size: 16px; cursor: pointer; }
        .btn:disabled { background: #333; color: #777; cursor: not-allowed; }
        .status-icon { font-size: 24px; margin-bottom: 10px; display: block; color: #555; }

        #start-game-btn { margin-top: 20px; background: var(--green); display: none; }

        /* Game Elements */
        #ar-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        .treasure { position: absolute; width: 70px; height: 70px; background: gold; border: 4px solid #fff; border-radius: 12px; box-shadow: 0 0 30px gold; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 30px; pointer-events: auto; transform: translate(-50%, -50%); }
        .treasure::after { content: '💰'; }

        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 1px solid white; border-radius: 50%; z-index: 5; opacity: 0.5; pointer-events: none; }
        #debug { position: absolute; bottom: 30px; left: 20px; color: #0f0; font-size: 12px; z-index: 15; text-align: left; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<video id="camera-feed" autoplay playsinline></video>

<div id="setup-overlay">
    <h1 style="color:var(--accent); margin-bottom: 30px;">AR SCANNER SETUP</h1>

    <div class="step-box" id="step1-box">
        <span class="status-icon" id="s1-icon">○</span>
        <button class="btn" id="cam-btn">STEP 1: ENABLE CAMERA</button>
    </div>

    <div class="step-box" id="step2-box">
        <span class="status-icon" id="s2-icon">○</span>
        <button class="btn" id="sensor-btn">STEP 2: ENABLE SENSORS</button>
    </div>

    <button class="btn" id="start-game-btn">START SCANNING</button>
</div>

<header>
    <div>TREASURE HUNTER</div>
    <div class="stats">FOUND: <span id="score-display">0</span></div>
</header>

<div id="crosshair"></div>
<div id="ar-container"></div>
<div id="debug">Sensors: OFF</div>

<script>
    let score = 0;
    let treasures = [];
    let currentAlpha = 0;
    let currentBeta = 0;
    let isRunning = false;
    let camReady = false;
    let sensorsReady = false;

    const camBtn = document.getElementById('cam-btn');
    const sensorBtn = document.getElementById('sensor-btn');
    const startBtn = document.getElementById('start-game-btn');

    // STEP 1: CAMERA
    camBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('camera-feed').srcObject = stream;
            camReady = true;
            document.getElementById('step1-box').classList.add('done');
            document.getElementById('s1-icon').innerText = '●';
            camBtn.innerText = "CAMERA ACTIVE";
            camBtn.disabled = true;
            checkReady();
        } catch (err) {
            alert("Camera Error: " + err);
        }
    };

    // STEP 2: SENSORS (Critical for iOS)
    sensorBtn.onclick = async () => {
        // For iOS 13+
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    activateSensors();
                } else {
                    alert("Permission denied. Sensors won't work.");
                }
            } catch (err) {
                alert("Sensor Error: " + err);
            }
        } else {
            // Android/Older iOS/Desktop
            activateSensors();
        }
    };

    function activateSensors() {
        window.addEventListener('deviceorientation', (e) => {
            // Normalizing Compass (Alpha) and Tilt (Beta)
            currentAlpha = e.webkitCompassHeading || (360 - e.alpha) || 0;
            currentBeta = e.beta || 0;
            document.getElementById('debug').innerHTML = `A: ${Math.floor(currentAlpha)} | B: ${Math.floor(currentBeta)}`;
        });
        
        sensorsReady = true;
        document.getElementById('step2-box').classList.add('done');
        document.getElementById('s2-icon').innerText = '●';
        sensorBtn.innerText = "SENSORS ACTIVE";
        sensorBtn.disabled = true;
        checkReady();
    }

    function checkReady() {
        if (camReady && sensorsReady) {
            startBtn.style.display = 'block';
        }
    }

    startBtn.onclick = () => {
        document.getElementById('setup-overlay').style.display = 'none';
        isRunning = true;
        // Spawn treasure immediately in front of user to verify it works
        spawnTreasure(true);
        // Spawn 4 more random ones
        for(let i=0; i<4; i++) spawnTreasure(false);
        requestAnimationFrame(updateLoop);
    };

    function spawnTreasure(inFront = false) {
        let tAlpha, tBeta;
        if (inFront) {
            tAlpha = currentAlpha;
            tBeta = currentBeta;
        } else {
            tAlpha = Math.floor(Math.random() * 360);
            tBeta = Math.floor(Math.random() * 50) + 50; 
        }

        const box = document.createElement('div');
        box.className = 'treasure';
        box.dataset.alpha = tAlpha;
        box.dataset.beta = tBeta;

        box.onclick = function() {
            score++;
            document.getElementById('score-display').innerText = score;
            this.remove();
            treasures = treasures.filter(t => t !== box);
            setTimeout(() => spawnTreasure(false), 1500); 
        };

        document.getElementById('ar-container').appendChild(box);
        treasures.push(box);
    }

    function getAngleDiff(target, current) {
        let diff = target - current;
        while (diff < -180) diff += 360;
        while (diff > 180) diff -= 360;
        return diff;
    }

    function updateLoop() {
        if (!isRunning) return;

        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const fov = sw / 60; 

        treasures.forEach(box => {
            const tA = parseFloat(box.dataset.alpha);
            const tB = parseFloat(box.dataset.beta);

            const dx = getAngleDiff(tA, currentAlpha);
            const dy = tB - currentBeta;

            const x = (sw / 2) + (dx * fov);
            const y = (sh / 2) - (dy * fov);

            box.style.left = `${x}px`;
            box.style.top = `${y}px`;

            // Only show if box is in front (roughly 60 degree cone)
            if (Math.abs(dx) > 60) {
                box.style.display = 'none';
            } else {
                box.style.display = 'flex';
            }
        });

        requestAnimationFrame(updateLoop);
    }
</script>
</body>
</html>
